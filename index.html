<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeddingGram 💍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">WeddingGram 💍</div>

<!-- STORIES -->
<div class="stories" id="stories"></div>

<!-- HOME FEED -->
<div id="home"></div>

<!-- REELS -->
<div id="reels" class="hidden"></div>

<!-- SEARCH -->
<div id="search" class="hidden">
  <input type="text" placeholder="Search wedding info..." class="search-bar">
  <div class="grid" id="grid"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">
  <h2>Deekshitha ❤️ Prasad</h2>
  <p>Join us on our special day 💕</p>
  <div class="grid" id="profileGrid"></div>
</div>

<!-- STORY MODAL -->
<div id="storyModal" class="story-modal hidden" onclick="closeStory()">
  <img id="storyImg">
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('home')">🏠</button>
  <button onclick="showTab('reels')">🎬</button>
  <button onclick="shareSite()">📤</button>
  <button onclick="showTab('search')">🔍</button>
  <button onclick="showTab('profile')">👤</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
