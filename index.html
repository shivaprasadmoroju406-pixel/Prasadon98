<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Instagram</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== PROFILE PAGE (DEFAULT) ===== -->
<div id="profilePage" class="page active">

  <h1 class="title">Deekshitha ❤️ Prasad</h1>

  <div id="countdown"></div>

  <button onclick="addToCalendar()">📅 Add to Calendar</button>

  <div class="profile-actions">
    <button onclick="showPage('homePage')">📸 Posts</button>
    <button onclick="showPage('reelsPage')">🎬 Reels</button>
  </div>

  <div id="profileGallery" class="grid"></div>

</div>

<!-- ===== HOME (STORIES + POSTS) ===== -->
<div id="homePage" class="page">

  <div id="stories" class="stories"></div>

  <div id="posts"></div>

</div>

<!-- ===== REELS ===== -->
<div id="reelsPage" class="page"></div>

<!-- ===== NAV ===== -->
<div class="nav">
  <button onclick="showPage('homePage')">🏠</button>
  <button onclick="showPage('reelsPage')">🎬</button>
  <button onclick="showPage('profilePage')">👤</button>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
