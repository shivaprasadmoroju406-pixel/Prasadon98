<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Social Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #000;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  font-size: 22px;
  font-weight: 600;
  border-bottom: 1px solid #222;
}

.header span {
  font-size: 26px;
}

/* STORIES */
.stories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 12px;
  border-bottom: 1px solid #222;
}

.story {
  text-align: center;
  min-width: 75px;
}

.story img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  padding: 2px;
  background: linear-gradient(45deg, orange, pink);
}

.story p {
  font-size: 12px;
  margin-top: 5px;
}

/* POSTS */
.post {
  margin-bottom: 20px;
}

.post-header {
  display: flex;
  align-items: center;
  padding: 10px;
}

.post-header img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  margin-right: 10px;
}

.post img.main {
  width: 100%;
  height: auto;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 15px;
  padding: 10px;
  font-size: 22px;
  cursor: pointer;
}

.actions span:hover {
  opacity: 0.7;
}

/* CAPTION */
.caption {
  padding: 0 10px 10px;
  font-size: 14px;
}

/* COMMENTS */
.comments {
  padding: 0 10px;
  font-size: 13px;
  color: #aaa;
}

.comment-box {
  display: flex;
  border-top: 1px solid #222;
  margin-top: 10px;
}

.comment-box input {
  flex: 1;
  background: transparent;
  border: none;
  color: white;
  padding: 10px;
}

.comment-box button {
  background: none;
  border: none;
  color: #3897f0;
  padding: 10px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="header">
  <span>WeddingGram</span>
  ❤️
</div>

<!-- STORIES -->
<div class="stories">

  <div class="story">
    <img src="assets/story1.jpg">
    <p>Aarav</p>
  </div>

  <div class="story">
    <img src="assets/story2.jpg">
    <p>Meera</p>
  </div>

  <div class="story">
    <img src="assets/story3.jpg">
    <p>Kabir</p>
  </div>

</div>

<!-- POSTS -->

<div id="feed"></div>

<script>

const posts = [
  {
    user: "Meera",
    profile: "assets/story2.jpg",
    image: "assets/post1.jpg",
    caption: "Best wishes ❤️"
  },
  {
    user: "Kabir",
    profile: "assets/story3.jpg",
    image: "assets/post2.jpg",
    caption: "Amazing memories 🔥"
  }
];

const feed = document.getElementById("feed");

posts.forEach((post, index) => {

  const postDiv = document.createElement("div");
  postDiv.className = "post";

  postDiv.innerHTML = `
    <div class="post-header">
      <img src="${post.profile}">
      <b>${post.user}</b>
    </div>

    <img class="main" src="${post.image}">

    <div class="actions">
      <span onclick="likePost(this)">🤍</span>
      <span onclick="focusComment(${index})">💬</span>
      <span onclick="sharePost()">✈️</span>
    </div>

    <div class="caption">
      <b>${post.user}</b> ${post.caption}
    </div>

    <div class="comments" id="comments-${index}"></div>

    <div class="comment-box">
      <input id="input-${index}" placeholder="Add a comment...">
      <button onclick="addComment(${index})">Post</button>
    </div>
  `;

  feed.appendChild(postDiv);
});

function likePost(el) {
  el.textContent = el.textContent === "🤍" ? "❤️" : "🤍";
}

function addComment(index) {
  const input = document.getElementById(`input-${index}`);
  const comments = document.getElementById(`comments-${index}`);

  if (input.value.trim() !== "") {
    const p = document.createElement("p");
    p.textContent = input.value;
    comments.appendChild(p);
    input.value = "";
  }
}

function focusComment(index) {
  document.getElementById(`input-${index}`).focus();
}

function sharePost() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied!");
}

</script>

</body>
</html>
