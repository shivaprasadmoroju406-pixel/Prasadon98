<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeddingGram 💍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- HEADER -->
<div class="header">
  <h2>WeddingGram 💍</h2>
</div>

<!-- STORIES -->
<div class="stories" id="stories"></div>

<!-- FEED -->
<div id="feed"></div>

<!-- REELS -->
<div class="reels hidden" id="reels"></div>

<!-- STORY MODAL -->
<div class="story-modal hidden" id="storyModal">
  <span onclick="closeStory()">✕</span>
  <img id="storyImg">
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button onclick="showHome()">🏠</button>
  <button onclick="showReels()">🎬</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
