<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deekshitha ❤️ Prasad</title>

<link rel="stylesheet" href="style.css">

<!-- ICONS -->
<script src="https://kit.fontawesome.com/a076d05399.js"></script>

</head>

<body>

<header>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h2>WeddingGram 💍</h2>
            </div>
        </div>
    </nav>
</header>

<main>
<div class="container">

<div class="col-9">

<!-- STORIES -->
<div class="statuses">

<div class="status">
<div class="image">
<img src="assets/story1.jpg">
</div>
<p>Aarav</p>
</div>

<div class="status">
<div class="image">
<img src="assets/story2.jpg">
</div>
<p>Meera</p>
</div>

<div class="status">
<div class="image">
<img src="assets/story3.jpg">
</div>
<p>Kabir</p>
</div>

<div class="status">
<div class="image">
<img src="assets/story4.jpg">
</div>
<p>Ravi</p>
</div>

</div>

<!-- POST 1 -->
<div class="card">
<div class="top">
<div class="userDetails">
<div class="profilepic">
<div class="profile_img">
<div class="image">
<img src="assets/story2.jpg">
</div>
</div>
</div>
<h3>Meera<br><span>Best Friend</span></h3>
</div>
</div>

<div class="imgBx">
<img src="assets/post1.jpg" class="cover">
</div>

<div class="bottom">
<div class="actionBtns">
<div class="left">
<span onclick="like(this)">❤️</span>
</div>
</div>

<p class="likes">Liked by Rahul & others</p>

<p class="message">
<b>Meera</b> Wishing you both a lifetime of happiness 💕
</p>

<div class="addComments">
<input type="text" placeholder="Add a comment...">

</div>

</div>
</div>

<!-- POST 2 -->
<div class="card">
<div class="top">
<div class="userDetails">
<div class="profilepic">
<div class="profile_img">
<div class="image">
<img src="assets/story3.jpg">
</div>
</div>
</div>
<h3>Kabir<br><span>College Friend</span></h3>
</div>
</div>

<div class="imgBx">
<img src="assets/post2.jpg" class="cover">
</div>

<div class="bottom">
<div class="actionBtns">
<div class="left">
<span onclick="like(this)">❤️</span>
</div>
</div>

<p class="likes">Liked by Ankit & others</p>

<b>Kabir</b> Best couple ever 🔥

<div class="addComments">
<input type="text" placeholder="Add a comment...">
<a href="#">Post</a>
</div>

</div>
</div>

</div>

</div>
</main>

<script>
function like(el){
  el.style.color = el.style.color === "red" ? "black" : "red";
}
</script>

</body>
</html>
