<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeddingGram 💍</title>

<link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="reelsPage" class="page">
  <div class="reels-container" id="reels"></div>
</div>

<div class="app">

<div class="header">WeddingGram 💍</div>

<div id="stories" class="stories"></div>

<div id="home"></div>

<div id="reels" class="hidden"></div>

<div id="search" class="hidden">
  <input class="search-bar" placeholder="Search...">
  <div id="grid" class="grid"></div>
</div>

<div id="profile" class="hidden">
  <h2>Deekshitha ❤️ Prasad</h2>
  <p>Join us on our special day 💕</p>
  <div id="profileGrid" class="grid"></div>
</div>

<!-- STORY VIEWER -->
<div id="storyModal" class="story-modal hidden" onclick="closeStory()">
  <div class="progress"><div id="bar" class="bar"></div></div>
  <img id="storyImg">
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('home')">🏠</button>
  <button onclick="showTab('reels')">🎬</button>
  <button onclick="shareSite()">📤</button>
  <button onclick="showTab('search')">🔍</button>
  <button onclick="showTab('profile')">👤</button>
</div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
