<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Insta Invite</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <h2>WeddingGram 💍</h2>
</div>

<!-- STORIES -->
<div id="stories"></div>

<!-- HOME FEED -->
<div id="home" class="page active"></div>

<!-- REELS PAGE -->
<div id="reelsPage" class="page"></div>

<!-- PROFILE PAGE -->
<div id="profilePage" class="page"></div>

<!-- STORY VIEW -->
<div id="storyViewer" onclick="closeStory()">
  <div class="progress"></div>
  <img id="storyImg">
</div>

<!-- BOTTOM NAV (INSTAGRAM STYLE) -->
<div class="navbar">
  <div onclick="switchTab('home')" class="tab active">🏠</div>
  <div onclick="switchTab('reels')" class="tab">🎬</div>
  <div onclick="switchTab('profile')" class="tab">👤</div>
</div>

<script src="script.js"></script>
</body>
</html>
