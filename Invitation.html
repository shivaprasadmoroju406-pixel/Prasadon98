<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: #fff8f0;
  overflow: hidden;
}

.section {
  height: 100vh;
  width: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.section.active { display: flex; }

h1 { color: #b22222; }

button {
  padding: 15px 30px;
  font-size: 18px;
  background: #b22222;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px;
}

#noBtn {
  position: relative;
}

.nav-buttons {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: none;
  gap: 10px;
}

.nav-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: #b22222;
  color: white;
  font-size: 18px;
}

</style>
</head>

<body>

<!-- FUN LANDING -->
<div class="section active" id="landing">
  <h1>💍 Prasad Weds Deekshitha 💍</h1>
  <p>Will you come to our wedding? 😄</p>

  <div>
    <button onclick="startInvite()">YES 😍</button>
    <button id="noBtn">NO 😏</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="section" id="main">
  <h1>You're Invited 🎉</h1>
  <p>Swipe / Scroll to explore</p>
</div>

<div class="section" id="details">
  <h1>Wedding Details</h1>
  <p>May 1, Hyderabad</p>
</div>

<div class="section" id="end">
  <h1>See You There ❤️</h1>
</div>

<div class="nav-buttons" id="navButtons">
  <button class="nav-btn" onclick="navigate(-1)">↑</button>
  <button class="nav-btn" onclick="navigate(1)">↓</button>
</div>

<script>
const sections = ['landing','main','details','end'];
let current = 0;
let started = false;
let busy = false;

function startInvite(){
  started = true;
  goTo(1);
  document.getElementById('navButtons').style.display='flex';
}

function goTo(i){
  if(i<0||i>=sections.length||busy) return;
  busy=true;
  document.getElementById(sections[current]).classList.remove('active');
  current=i;
  document.getElementById(sections[current]).classList.add('active');
  setTimeout(()=>busy=false,400);
}

function navigate(d){
  if(!started) return;
  goTo(current+d);
}

/* DESKTOP: runaway NO button */
const noBtn = document.getElementById('noBtn');
noBtn.addEventListener('mouseenter', ()=>{
  moveNoButton();
});

function moveNoButton(){
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);
  noBtn.style.position = 'fixed';
  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
}

/* MOBILE: tap makes NO escape */
noBtn.addEventListener('touchstart', (e)=>{
  e.preventDefault();
  moveNoButton();
});

/* SCROLL */
let t;
document.addEventListener('wheel', e=>{
  if(!started) return;
  clearTimeout(t);
  t=setTimeout(()=>navigate(e.deltaY>0?1:-1),50);
});

/* TOUCH NAV */
let y=0;
document.addEventListener('touchstart',e=>y=e.touches[0].clientY);
document.addEventListener('touchend',e=>{
  if(!started) return;
  let dy=y-e.changedTouches[0].clientY;
  if(Math.abs(dy)>50) navigate(dy>0?1:-1);
});

/* KEYBOARD */
window.addEventListener('keydown',e=>{
  if(!started) return;
  if(e.key==='ArrowDown') navigate(1);
  if(e.key==='ArrowUp') navigate(-1);
});

</script>

</body>
</html>
